<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteKeeper Map</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
    <script>
        // ---------------------------------------------------------------------------
        // Swift → JavaScript bridge
        // Messages sent from Swift via evaluateJavaScript() are handled here.
        // JavaScript → Swift messages are sent via:
        //   window.webkit.messageHandlers.routekeeper.postMessage({ ... })
        // ---------------------------------------------------------------------------
        function handleSwiftMessage(name, payload) {
            // Reserved for future increments.
            console.log("Swift message:", name, payload);
        }

        // ---------------------------------------------------------------------------
        // Map initialisation
        // ---------------------------------------------------------------------------
        const map = new maplibregl.Map({
            container: "map",
            style: "https://demotiles.maplibre.org/style.json",
            center: [-2.0, 54.0],   // [longitude, latitude] — centre over the UK
            zoom: 5
        });

        map.addControl(new maplibregl.NavigationControl(), "top-right");

        map.on("load", function () {
            // Notify Swift that the map is ready to receive instructions.
            if (window.webkit && window.webkit.messageHandlers && window.webkit.messageHandlers.routekeeper) {
                window.webkit.messageHandlers.routekeeper.postMessage({ event: "mapReady" });
            }
        });
    </script>
</body>
</html>
