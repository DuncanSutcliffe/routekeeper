<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteKeeper Map</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        #map-context-menu {
            position: absolute;
            background: white;
            border-radius: 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.18);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px;
            z-index: 1000;
            display: none;
            min-width: 160px;
            overflow: hidden;
            user-select: none;
        }
        .map-context-item {
            padding: 8px 12px;
            cursor: pointer;
            color: #1a1a1a;
        }
        .map-context-item:hover {
            background: #f0f0f0;
        }
        /* Item name label popups — compact tooltip, no arrow */
        .maplibregl-popup.item-label .maplibregl-popup-content {
            background: rgba(28, 28, 28, 0.84);
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 11px;
            font-weight: 500;
            padding: 3px 8px;
            border-radius: 4px;
            box-shadow: none;
            white-space: nowrap;
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
        }
        .maplibregl-popup.item-label .maplibregl-popup-tip {
            display: none;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="map-context-menu">
        <div class="map-context-item" onclick="addWaypointHere()">New waypoint here</div>
    </div>

    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
    <script>
        window.onerror = function(message, source, lineno, colno, error) {
            var detail = message + ' (line ' + lineno + ')';
            if (window.webkit && window.webkit.messageHandlers &&
                window.webkit.messageHandlers.routekeeper) {
                window.webkit.messageHandlers.routekeeper.postMessage(
                    { type: 'debugLog', message: 'JS ERROR: ' + detail });
            }
            return false;
        };

        // ---------------------------------------------------------------------------
        // Swift → JavaScript bridge
        // Messages sent from Swift via evaluateJavaScript() are handled here.
        // JavaScript → Swift messages are sent via:
        //   window.webkit.messageHandlers.routekeeper.postMessage({ ... })
        // ---------------------------------------------------------------------------
        function handleSwiftMessage(name, payload) {
            console.log("Swift message:", name, payload);
        }

        function postToSwift(payload) {
            if (window.webkit &&
                window.webkit.messageHandlers &&
                window.webkit.messageHandlers.routekeeper) {
                window.webkit.messageHandlers.routekeeper.postMessage(payload);
            }
        }

        // ---------------------------------------------------------------------------
        // Item name label popups
        // ---------------------------------------------------------------------------

        // Dictionary of active Popup instances keyed by String(itemId).
        var labelPopups = {};

        // Tracks all dynamic layer and source IDs added by showMultipleItems so
        // clearMultipleItems can remove them without needing to know how many items
        // there are or what types they are.
        var multiViaLayerIds = [];
        var multiViaSources  = [];

        // Holds the start and end maplibregl.Marker instances added by showMultipleItems.
        // Cleared by clearMultipleItems().
        var multiRouteMarkers = [];

        // Holds maplibregl.Marker instances for draggable via/shaping waypoints on
        // the currently displayed single route.  Cleared by clearRoute().
        var routeDraggableMarkers = [];

        // Holds the start and end maplibregl.Marker instances for the currently
        // displayed single route.  Cleared by clearRoute().
        var routeMarkers = [];

        // Holds the start and end maplibregl.Marker instances for the currently
        // displayed single track.  Cleared by hideTrack().
        var trackStartMarker = null;
        var trackEndMarker   = null;

        // State for the rubber-band drag-to-insert interaction.
        var routeDragActive = false;
        var routeDragAnchorA = null;
        var routeDragAnchorB = null;
        var routeDragInsertIndex = 0;

        // Tracks whether the Option (Alt) key is currently held.
        var altKeyHeld = false;

        // Ordered [lng, lat] pairs for the actual route points (start, via, shaping, end)
        // of the currently displayed single route.  Populated by showRoute(), cleared by clearRoute().
        var routePointCoords = [];

        // Holds the maplibregl.Marker instance for the currently displayed library
        // waypoint, or null when no waypoint is shown.  Cleared by clearWaypoint().
        var waypointMarker = null;

        // ID of the direction-arrow symbol layer and its dedicated flattened source
        // added by showRoute(), or null when no single route is displayed.  Both are
        // stored so clearRoute() can remove them by ID without knowing the routeItemId.
        var routeArrowLayerId     = null;
        var routeArrowSourceId    = null;
        var routeArrowImageId     = null; // map.addImage key, removed by clearRoute
        var routeArrowFlatCoords  = null; // retained for zoom-level rebuilds
        var routeArrowZoomHandler = null; // zoomend listener reference for removal

        // Retained by showMultipleItems so the zoomend handler can rebuild arrow sources.
        var multiArrowData        = []; // [{ sourceId, flatCoords }]
        var multiArrowZoomHandler = null;

        /// Returns the coordinate at 50% of the cumulative Euclidean length of
        /// a LineString defined by an array of [lng, lat] pairs.
        ///
        /// The midpoint is found by:
        ///   1. Summing the straight-line distances between consecutive pairs to
        ///      obtain the total length.
        ///   2. Walking the segments again until the running total reaches half
        ///      the total length, then linearly interpolating between the two
        ///      coordinates that straddle the halfway point.
        ///
        /// Returns coords[0] when the array has fewer than two points.
        function lineMidpoint(coords) {
            if (!coords || coords.length < 2) return coords[0];

            // Pass 1 — total length.
            var total = 0;
            for (var i = 0; i < coords.length - 1; i++) {
                var dx = coords[i + 1][0] - coords[i][0];
                var dy = coords[i + 1][1] - coords[i][1];
                total += Math.sqrt(dx * dx + dy * dy);
            }

            // Pass 2 — walk to the halfway point and interpolate.
            var half = total / 2;
            var running = 0;
            for (var i = 0; i < coords.length - 1; i++) {
                var dx = coords[i + 1][0] - coords[i][0];
                var dy = coords[i + 1][1] - coords[i][1];
                var segLen = Math.sqrt(dx * dx + dy * dy);
                if (running + segLen >= half) {
                    var t = segLen > 0 ? (half - running) / segLen : 0;
                    return [
                        coords[i][0] + t * dx,
                        coords[i][1] + t * dy
                    ];
                }
                running += segLen;
            }

            // Fallback: return the last coordinate.
            return coords[coords.length - 1];
        }

        /// Distributes targetCount evenly-spaced arrow points along a flat array of
        /// [lng, lat] pairs and returns them with their bearing in degrees clockwise
        /// from north, derived from the incoming segment direction.
        ///
        /// Points are placed at the midpoints of each equal interval so arrows are
        /// spread uniformly and do not cluster at line endpoints.
        function computeArrowPoints(coordinates, targetCount) {
            if (!coordinates || coordinates.length < 2 || targetCount < 1) return [];
            var total = 0;
            for (var i = 0; i < coordinates.length - 1; i++) {
                var ddx = coordinates[i+1][0] - coordinates[i][0];
                var ddy = coordinates[i+1][1] - coordinates[i][1];
                total += Math.sqrt(ddx*ddx + ddy*ddy);
            }
            if (total === 0) return [];
            var interval = total / targetCount;
            var points   = [];
            var running  = 0;
            var next     = interval * 0.5; // first arrow at mid-interval
            for (var i = 0; i < coordinates.length - 1; i++) {
                var ax = coordinates[i][0],   ay = coordinates[i][1];
                var bx = coordinates[i+1][0], by = coordinates[i+1][1];
                var sdx = bx - ax, sdy = by - ay;
                var len = Math.sqrt(sdx*sdx + sdy*sdy);
                while (running + len >= next) {
                    var t = len > 0 ? (next - running) / len : 0;
                    var bearing = Math.atan2(sdx, sdy) * 180 / Math.PI;
                    if (bearing < 0) bearing += 360;
                    points.push({
                        coord:   [ax + t * sdx, ay + t * sdy],
                        bearing: bearing
                    });
                    next += interval;
                }
                running += len;
            }
            return points;
        }

        /// Multiplies each RGB component of a CSS hex colour by factor (0–1) and
        /// returns the result as a '#rrggbb' string.  Components are clamped to 0–255.
        function darkenHex(hex, factor) {
            var h = hex.replace('#', '');
            if (h.length === 3) { h = h[0]+h[0]+h[1]+h[1]+h[2]+h[2]; }
            var r = Math.min(255, Math.round(parseInt(h.slice(0,2), 16) * factor));
            var g = Math.min(255, Math.round(parseInt(h.slice(2,4), 16) * factor));
            var b = Math.min(255, Math.round(parseInt(h.slice(4,6), 16) * factor));
            return '#' + [r, g, b].map(function(c) {
                return ('0' + c.toString(16)).slice(-2);
            }).join('');
        }

        /// Draws a narrow isosceles triangle on a 12×20 canvas pointing upward.
        ///
        /// Apex at (6,1), base corners at (2,19) and (10,19), giving a sharp point
        /// with a modest base width.  Filled with color and stroked with a dark
        /// semi-transparent outline.
        function createArrowImage(color) {
            var canvas  = document.createElement('canvas');
            canvas.width  = 9;
            canvas.height = 12;
            var ctx = canvas.getContext('2d');
            ctx.beginPath();
            ctx.moveTo(4,  1);  // apex — centre-top
            ctx.lineTo(8, 11);  // base — bottom-right
            ctx.lineTo(0, 11);  // base — bottom-left
            ctx.closePath();
            ctx.fillStyle = color;
            ctx.fill();
            ctx.strokeStyle = 'rgba(0, 0, 0, 0.65)';
            ctx.lineWidth   = 1.5;
            ctx.stroke();
            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            return { width: canvas.width, height: canvas.height, data: imageData.data };
        }

        /// Creates (or replaces) a compact name label popup anchored at [lng, lat].
        ///
        /// itemId — unique integer identifier for the item; used as the dictionary key
        /// lng, lat — WGS-84 coordinates for the anchor point
        /// name — plain-text label content
        function showLabel(itemId, lng, lat, name, iconBase64) {
            hideLabel(itemId);
            var popup = new maplibregl.Popup({
                closeButton: false,
                closeOnClick: false,
                anchor: 'bottom',
                offset: [16, -38],
                className: 'item-label'
            })
            .setLngLat([lng, lat]);
            var safe = name.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
            if (iconBase64) {
                popup.setHTML('<div title="' + safe + '" style="display:flex;align-items:center;gap:6px;overflow:hidden;">' +
                    '<img src="data:image/png;base64,' + iconBase64 + '" ' +
                    'style="width:20px;height:20px;flex-shrink:0;opacity:0.9;" />' +
                    '<span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;">' + safe + '</span>' +
                    '</div>');
            } else {
                popup.setHTML('<span title="' + safe + '" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;">' + safe + '</span>');
            }
            popup.addTo(map);
            labelPopups[String(itemId)] = popup;
        }

        /// Removes the popup for the given itemId, if one exists.
        function hideLabel(itemId) {
            var key = String(itemId);
            if (labelPopups[key]) {
                labelPopups[key].remove();
                delete labelPopups[key];
            }
        }

        /// Removes every active label popup and clears the dictionary.
        function hideAllLabels() {
            for (var id in labelPopups) {
                labelPopups[id].remove();
            }
            labelPopups = {};
        }

        // ---------------------------------------------------------------------------
        // Map initialisation
        // ---------------------------------------------------------------------------
        // mapStyleName and mapApiKey are injected by Swift via WKUserScript before
        // this page loads.  getInitialStyleUrl() builds the full MapTiler URL from
        // those two values.  If the injection failed the style string falls back to
        // an empty string so the failure is visible in the console.

        function getInitialStyleUrl(styleName, apiKey) {
            return "https://api.maptiler.com/maps/" + styleName +
                   "/style.json?key=" + apiKey;
        }

        const styleURL =
            (typeof mapStyleName !== "undefined" && mapStyleName &&
             typeof mapApiKey    !== "undefined" && mapApiKey)
            ? getInitialStyleUrl(mapStyleName, mapApiKey)
            : "";

        const map = new maplibregl.Map({
            container: "map",
            style: styleURL,
            center: [-2.0, 54.0],   // [longitude, latitude] — centre over the UK
            zoom: 5
        });

        map.addControl(new maplibregl.NavigationControl(), "top-right");

        // mapFirstLoadComplete guards the style.load handler below so that the
        // initial style load does not fire mapStyleLoaded (mapReady covers that).
        var mapFirstLoadComplete = false;

        // Holds the active ScaleControl instance so setScaleUnits() can remove it.
        var scaleControl = null;

        map.on("load", function () {
            mapFirstLoadComplete = true;
            var initialUnit = (typeof mapScaleUnit !== "undefined" && mapScaleUnit)
                ? mapScaleUnit : 'metric';
            scaleControl = new maplibregl.ScaleControl({ unit: initialUnit });
            map.addControl(scaleControl, 'bottom-left');
            postToSwift({ type: "mapReady" });
        });

        // Fires after every setStyle() call once the new style is fully applied.
        // Swift uses this to re-add any custom layers that the style change wiped.
        map.on("style.load", function () {
            if (mapFirstLoadComplete) {
                postToSwift({ type: "mapStyleLoaded" });
            }
        });

        // ---------------------------------------------------------------------------
        // Map style switching
        // ---------------------------------------------------------------------------

        // When true, the next repositioning call inside showWaypoint or showRoute
        // is skipped and this flag is immediately reset to false.  Set by
        // prepareStyleSwitch() just before setMapStyle() so that the layer-restore
        // pass triggered by mapStyleLoaded does not move the viewport.
        var suppressRecentre = false;

        /// Signals that the next showWaypoint / showRoute call is a style-switch
        /// restore and should not reposition the map.
        function prepareStyleSwitch() {
            suppressRecentre = true;
        }

        /// Switches the map to a different MapTiler style by name.
        ///
        /// styleName — one of "streets-v4", "hybrid-v4", "topo-v4"
        ///
        /// After the new style finishes loading, MapLibre fires "style.load" which
        /// Swift handles by re-adding any custom layers that were wiped.
        function setMapStyle(styleName) {
            map.setStyle(getInitialStyleUrl(styleName, mapApiKey));
        }

        /// Replaces the scale control with one using the given unit system.
        ///
        /// unit — "metric" (kilometres) or "imperial" (miles)
        function setScaleUnits(unit) {
            if (scaleControl) {
                map.removeControl(scaleControl);
            }
            scaleControl = new maplibregl.ScaleControl({ unit: unit });
            map.addControl(scaleControl, 'bottom-left');
        }

        // ---------------------------------------------------------------------------
        // Route drawing
        // ---------------------------------------------------------------------------

        /// Draws a GeoJSON route on the map.
        ///
        /// geojsonString — a JSON string containing a GeoJSON FeatureCollection
        /// or Feature with a LineString geometry.
        ///
        /// If the map style is not yet loaded the call is deferred until it is.
        /// If a route is already drawn its data is replaced in-place (the layer
        /// is not recreated, which avoids a visual flash).
        function drawRoute(geojsonString) {
            if (!map.isStyleLoaded()) {
                map.once("idle", function () { drawRoute(geojsonString); });
                return;
            }

            const geojson = JSON.parse(geojsonString);

            if (map.getSource("active-route")) {
                // Update existing source data without touching the layer.
                map.getSource("active-route").setData(geojson);
            } else {
                map.addSource("active-route", {
                    type: "geojson",
                    data: geojson
                });

                map.addLayer({
                    id: "active-route",
                    type: "line",
                    source: "active-route",
                    layout: {
                        "line-join": "round",
                        "line-cap": "round"
                    },
                    paint: {
                        "line-color": "#3b82f6",
                        "line-width": 4,
                        "line-opacity": 0.85
                    }
                });
            }

            postToSwift({ type: "routeDrawn" });
        }

        // ---------------------------------------------------------------------------
        // Stored route display (sidebar selection)
        // ---------------------------------------------------------------------------


        /// Decodes a base64-encoded PNG into an ImageData object by drawing it
        /// onto an offscreen canvas and reading back the pixel data.
        ///
        /// Returns a Promise that resolves to an ImageData instance, which
        /// map.addImage() accepts directly.
        function base64PngToImageData(base64) {
            return new Promise(function(resolve, reject) {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    canvas.width  = img.width;
                    canvas.height = img.height;
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    resolve(ctx.getImageData(0, 0, img.width, img.height));
                };
                img.onerror = reject;
                img.src = 'data:image/png;base64,' + base64;
            });
        }

        /// Registers a batch of category icon images with the MapLibre style.
        ///
        /// iconsJson — JSON string: array of { name, base64Png } objects.
        ///             name should be a stable identifier such as "icon-cafe".
        ///
        /// Each PNG is decoded via base64PngToImageData() and registered with
        /// map.addImage().  A per-image try/catch ensures one bad entry does not
        /// abort the rest.  Already-registered names are removed first so this
        /// function is safe to call again after a map.setStyle() wipe.
        async function registerCategoryIcons(iconsJson) {
            var icons = JSON.parse(iconsJson);
            for (var i = 0; i < icons.length; i++) {
                var entry = icons[i];
                try {
                    var imageData = await base64PngToImageData(entry.base64Png);
                    if (map.hasImage(entry.name)) map.removeImage(entry.name);
                    map.addImage(entry.name, imageData, { pixelRatio: 2 });
                } catch (e) {
                    console.warn('registerCategoryIcons: failed to register', entry.name, e);
                }
            }
        }

        /// Shows a stored route on the map, with start and end marker icons,
        /// numbered circles for announcing via waypoints, and small filled dots
        /// for shaping (non-announcing) waypoints.
        ///
        /// geojsonString        — JSON string of the Valhalla GeoJSON FeatureCollection
        /// startBase64          — base64-encoded PNG for the start marker
        /// endBase64            — base64-encoded PNG for the end marker
        /// viaWaypointsJSON     — JSON string: array of {lat, lng, index} for announcing points
        /// lineColour           — CSS hex colour for the route line (default '#1A73E8')
        /// shapingWaypointsJSON — JSON string: array of {lat, lng} for shaping points
        /// itemId               — (optional) item identifier; when supplied a name label is shown
        /// name                 — (optional) plain-text label displayed at the route start
        ///
        /// Image loading is Promise-based because HTMLImageElement src loading
        /// is async — MapLibre silently ignores addImage calls on unloaded images.
        /// fitBounds is suppressed when suppressRecentre is true (set by prepareStyleSwitch).
        function showRoute(geojsonString, viaWaypointsJSON, lineColour, shapingWaypointsJSON, itemId, name, startSeq, endSeq, routeIconBase64) {
            lineColour = lineColour || '#1A73E8';

            clearRoute();
            const geojson = JSON.parse(geojsonString);
            const coords = geojson.features[0].geometry.coordinates;
            const startCoord = coords[0];
            const endCoord = coords[coords.length - 1];

            map.addSource('route-source', { type: 'geojson', data: geojson });
            map.addLayer({
                id: 'route-layer',
                type: 'line',
                source: 'route-source',
                layout: { 'line-cap': 'round', 'line-join': 'round' },
                paint: { 'line-color': lineColour, 'line-width': 4 }
            });
            routeArrowLayerId  = (itemId !== null && itemId !== undefined)
                ? 'route-arrows-' + itemId : 'route-arrows';
            routeArrowSourceId = (itemId !== null && itemId !== undefined)
                ? 'route-arrows-source-' + itemId : 'route-arrows-source';
            var arrowFlatCoords = [];
            for (var fi = 0; fi < geojson.features.length; fi++) {
                var f = geojson.features[fi];
                if (f.geometry && f.geometry.type === 'LineString') {
                    arrowFlatCoords = arrowFlatCoords.concat(f.geometry.coordinates);
                }
            }
            routeArrowFlatCoords = arrowFlatCoords;
            var arrowCount    = Math.min(500, Math.max(4, Math.round(Math.pow(2, map.getZoom() - 3))));
            var arrowPts      = computeArrowPoints(arrowFlatCoords, arrowCount);
            var arrowFeatures = [];
            for (var api = 0; api < arrowPts.length; api++) {
                arrowFeatures.push({
                    type: 'Feature',
                    geometry: { type: 'Point', coordinates: arrowPts[api].coord },
                    properties: { bearing: arrowPts[api].bearing }
                });
            }
            routeArrowImageId = (itemId !== null && itemId !== undefined)
                ? 'arrow-' + itemId : 'arrow';
            var arrowImageData = createArrowImage(darkenHex(lineColour, 0.75));
            map.addImage(routeArrowImageId, arrowImageData);
            map.addSource(routeArrowSourceId, {
                type: 'geojson',
                data: { type: 'FeatureCollection', features: arrowFeatures }
            });
            map.addLayer({
                id: routeArrowLayerId,
                type: 'symbol',
                source: routeArrowSourceId,
                layout: {
                    'symbol-placement': 'point',
                    'icon-image': routeArrowImageId,
                    'icon-rotate': ['get', 'bearing'],
                    'icon-rotation-alignment': 'map',
                    'icon-allow-overlap': true,
                    'icon-ignore-placement': true,
                    'icon-size': 1
                },
                paint: {}
            });
            routeArrowZoomHandler = function() {
                if (!routeArrowSourceId || !map.getSource(routeArrowSourceId)) return;
                var count = Math.min(500, Math.max(4, Math.round(Math.pow(2, map.getZoom() - 3))));
                var pts   = computeArrowPoints(routeArrowFlatCoords, count);
                var feats = [];
                for (var i = 0; i < pts.length; i++) {
                    feats.push({
                        type: 'Feature',
                        geometry: { type: 'Point', coordinates: pts[i].coord },
                        properties: { bearing: pts[i].bearing }
                    });
                }
                map.getSource(routeArrowSourceId).setData({ type: 'FeatureCollection', features: feats });
            };
            map.on('zoomend', routeArrowZoomHandler);

            // Start marker.
            const startMarker = new maplibregl.Marker({ draggable: true, color: lineColour })
                .setLngLat(startCoord)
                .addTo(map);
            let startDragAlt = false, startDragOrigin = null;
            startMarker.on('dragstart', () => {
                startDragAlt = altKeyHeld;
                startDragOrigin = startMarker.getLngLat();
            });
            startMarker.on('dragend', () => {
                if (!startDragAlt) { startMarker.setLngLat(startDragOrigin); return; }
                const pos = startMarker.getLngLat();
                postToSwift({
                    type: 'waypointDragged',
                    routeItemId: itemId,
                    sequenceNumber: startSeq,
                    latitude: pos.lat,
                    longitude: pos.lng,
                    previousLat: startDragOrigin.lat,
                    previousLng: startDragOrigin.lng
                });
            });
            routeMarkers.push(startMarker);

            // End marker.
            const endMarker = new maplibregl.Marker({ draggable: true, color: lineColour })
                .setLngLat(endCoord)
                .addTo(map);
            let endDragAlt = false, endDragOrigin = null;
            endMarker.on('dragstart', () => {
                endDragAlt = altKeyHeld;
                endDragOrigin = endMarker.getLngLat();
            });
            endMarker.on('dragend', () => {
                if (!endDragAlt) { endMarker.setLngLat(endDragOrigin); return; }
                const pos = endMarker.getLngLat();
                postToSwift({
                    type: 'waypointDragged',
                    routeItemId: itemId,
                    sequenceNumber: endSeq,
                    latitude: pos.lat,
                    longitude: pos.lng,
                    previousLat: endDragOrigin.lat,
                    previousLng: endDragOrigin.lng
                });
            });
            routeMarkers.push(endMarker);

            // Announcing via waypoint markers.
            const viaWaypoints = (viaWaypointsJSON && viaWaypointsJSON.length > 2)
                ? JSON.parse(viaWaypointsJSON) : [];
            viaWaypoints.forEach(function(w) {
                const viaMarker = new maplibregl.Marker({ draggable: true, color: lineColour, scale: 0.7 })
                    .setLngLat([w.lng, w.lat])
                    .addTo(map);
                let viaDragAlt = false, viaDragOrigin = null;
                viaMarker.on('dragstart', () => {
                    viaDragAlt = altKeyHeld;
                    viaDragOrigin = viaMarker.getLngLat();
                });
                viaMarker.on('dragend', () => {
                    if (!viaDragAlt) { viaMarker.setLngLat(viaDragOrigin); return; }
                    const pos = viaMarker.getLngLat();
                    postToSwift({
                        type: 'waypointDragged',
                        routeItemId: itemId,
                        sequenceNumber: w.seq,
                        latitude: pos.lat,
                        longitude: pos.lng,
                        previousLat: viaDragOrigin.lat,
                        previousLng: viaDragOrigin.lng
                    });
                });
                routeMarkers.push(viaMarker);
            });

            // Shaping waypoint markers.
            const shapingWaypoints = (shapingWaypointsJSON && shapingWaypointsJSON.length > 2)
                ? JSON.parse(shapingWaypointsJSON) : [];

            // Build ordered route point coords for rubber-band segment detection.
            // Merge start, all via, all shaping, and end; sort by sequence number.
            var allRoutePoints = [{ seq: startSeq, coord: startCoord }];
            viaWaypoints.forEach(function(w) { allRoutePoints.push({ seq: w.seq, coord: [w.lng, w.lat] }); });
            shapingWaypoints.forEach(function(w) { allRoutePoints.push({ seq: w.seq, coord: [w.lng, w.lat] }); });
            allRoutePoints.push({ seq: endSeq, coord: endCoord });
            allRoutePoints.sort(function(a, b) { return a.seq - b.seq; });
            routePointCoords = allRoutePoints.map(function(p) { return p.coord; });

            shapingWaypoints.forEach(function(w) {
                const shapingMarker = new maplibregl.Marker({ draggable: true, color: '#888888', scale: 0.5, offset: [0, -7] })
                    .setLngLat([w.lng, w.lat])
                    .addTo(map);
                let shapingDragAlt = false, shapingDragOrigin = null;
                shapingMarker.on('dragstart', () => {
                    shapingDragAlt = altKeyHeld;
                    shapingDragOrigin = shapingMarker.getLngLat();
                });
                shapingMarker.on('dragend', () => {
                    if (!shapingDragAlt) { shapingMarker.setLngLat(shapingDragOrigin); return; }
                    const pos = shapingMarker.getLngLat();
                    postToSwift({
                        type: 'waypointDragged',
                        routeItemId: itemId,
                        sequenceNumber: w.seq,
                        latitude: pos.lat,
                        longitude: pos.lng,
                        previousLat: shapingDragOrigin.lat,
                        previousLng: shapingDragOrigin.lng
                    });
                });
                routeMarkers.push(shapingMarker);
            });

            if (suppressRecentre) {
                suppressRecentre = false;
            } else {
                const bounds = geojson.features[0].bbox ||
                    coords.reduce((b, c) => [
                        Math.min(b[0], c[0]), Math.min(b[1], c[1]),
                        Math.max(b[2], c[0]), Math.max(b[3], c[1])
                    ], [Infinity, Infinity, -Infinity, -Infinity]);
                map.fitBounds([[bounds[0], bounds[1]], [bounds[2], bounds[3]]], { padding: 60 });
            }

            if (itemId !== undefined && itemId !== null) {
                var labelCoord = lineMidpoint(coords);
                showLabel(itemId, labelCoord[0], labelCoord[1], name || '', routeIconBase64);
            }
        }

        /// Removes the route line, marker symbols, via circles, shaping dots,
        /// registered images, all associated sources, and all label popups.
        ///
        /// Also clears the legacy "active-route" id used by drawRoute() so that
        /// switching between the two mechanisms never leaves orphaned layers.
        function clearRoute() {
            routeMarkers.forEach(function(m) { m.remove(); });
            routeMarkers = [];
            routePointCoords = [];
            if (routeArrowZoomHandler) {
                map.off('zoomend', routeArrowZoomHandler);
                routeArrowZoomHandler = null;
            }
            routeArrowFlatCoords = null;
            if (routeArrowLayerId && map.getLayer(routeArrowLayerId)) {
                map.removeLayer(routeArrowLayerId);
            }
            routeArrowLayerId = null;
            if (routeArrowSourceId && map.getSource(routeArrowSourceId)) {
                map.removeSource(routeArrowSourceId);
            }
            routeArrowSourceId = null;
            routeArrowImageId  = null;
            if (map.getLayer('route-layer'))              map.removeLayer('route-layer');
            if (map.getSource('route-source'))            map.removeSource('route-source');
            if (map.getLayer('active-route'))             map.removeLayer('active-route');
            if (map.getSource('active-route'))            map.removeSource('active-route');
            hideAllLabels();
        }

        // ---------------------------------------------------------------------------
        // Waypoint display
        // ---------------------------------------------------------------------------

        /// Shows a single waypoint marker on the map.
        ///
        /// lat, lng    — WGS-84 coordinates
        /// colour      — CSS colour string used for the circle stroke, e.g. "#E8453C"
        /// itemId      — (optional) item identifier; when supplied a name label is shown
        /// name        — (optional) plain-text label displayed adjacent to the marker
        /// iconBase64  — (optional) base64-encoded PNG of the SF Symbol category icon;
        ///               pass null or omit to render the plain circle only
        ///
        /// Any existing waypoint marker is removed first. If the style is not yet
        /// loaded the call is deferred until the map is idle.
        /// flyTo is suppressed when suppressRecentre is true (set by prepareStyleSwitch).
        function showWaypoint(lat, lng, colour, itemId, name, iconBase64) {
            if (!map.isStyleLoaded()) {
                map.once("idle", function () {
                    showWaypoint(lat, lng, colour, itemId, name, iconBase64);
                });
                return;
            }

            clearWaypoint();

            waypointMarker = new maplibregl.Marker({ color: colour, draggable: true })
                .setLngLat([lng, lat])
                .addTo(map);

            let waypointDragAlt = false, waypointDragOrigin = null;
            waypointMarker.on('dragstart', () => {
                waypointDragAlt = altKeyHeld;
                waypointDragOrigin = waypointMarker.getLngLat();
            });
            waypointMarker.on('dragend', () => {
                if (!waypointDragAlt) { waypointMarker.setLngLat(waypointDragOrigin); return; }
                const pos = waypointMarker.getLngLat();
                postToSwift({
                    type: 'waypointMoved',
                    itemId: itemId,
                    latitude: pos.lat,
                    longitude: pos.lng,
                    previousLat: waypointDragOrigin.lat,
                    previousLng: waypointDragOrigin.lng
                });
            });

            if (suppressRecentre) {
                suppressRecentre = false;
            } else {
                map.flyTo({ center: [lng, lat], zoom: 13 });
            }

            if (itemId !== undefined && itemId !== null) {
                showLabel(itemId, lng, lat, name || '', iconBase64 || null);
            }
        }

        /// Removes the waypoint marker and all labels.
        function clearWaypoint() {
            if (waypointMarker) {
                waypointMarker.remove();
                waypointMarker = null;
            }
            hideAllLabels();
        }

        // ---------------------------------------------------------------------------
        // Multi-item display (list selection and multi-select)
        // ---------------------------------------------------------------------------

        /// Renders multiple waypoints and routes simultaneously, then fits the
        /// viewport to contain all of them.
        ///
        /// itemsJson — JSON string of item objects:
        ///   { type: "waypoint", lat, lng, color, itemId, name, iconImageName }
        ///   { type: "route", geojson, color, itemId, name, viaWaypoints, shapingWaypoints }
        ///
        /// Every source and layer uses a per-item dynamic ID tracked in multiViaLayerIds /
        /// multiViaSources so clearMultipleItems can remove them without fixed-name lookups.
        /// Route lines are the only exception — they are batched into multi-routes-source /
        /// multi-routes-layer for efficient data-driven colour rendering.
        ///
        /// Rendering order (bottom → top):
        ///   route lines → route start/end circles+icons → via/shaping → waypoint circles+icons
        async function showMultipleItems(itemsJson) {
            if (!map.isStyleLoaded()) {
                map.once("idle", function () { showMultipleItems(itemsJson); });
                return;
            }

            clearMultipleItems();
            clearRoute();
            clearWaypoint();

            var items = JSON.parse(itemsJson);
            var routeLineFeatures = [];
            var boundsCoords      = [];

            // Collected during the item loop; rendered after route lines for correct z-order.
            var routeMarkerGroups = []; // { startCoord, endCoord, routeColour, rId }
            var viaGroups         = []; // { sourceId, circleId, labelId, features, colour }
            var shapingGroups     = []; // { sourceId, layerId, features, colour }
            var waypointGroups    = []; // { wpId, lng, lat, colour, iconImageName, name, labelIconBase64 }
            var trackGroups       = []; // { sourceId, layerId, coords, colour, lineStyle, itemId }
            var arrowGroups       = []; // { sourceId, layerId, geojson, colour }

            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                if (item.type === "waypoint") {
                    waypointGroups.push({
                        wpId:            item.itemId,
                        lng:             item.lng,
                        lat:             item.lat,
                        colour:          item.color || '#E8453C',
                        iconImageName:   item.iconImageName || '',
                        name:            item.name || '',
                        labelIconBase64: item.labelIconBase64 || null
                    });
                    boundsCoords.push([item.lng, item.lat]);
                } else if (item.type === "route") {
                    var geojson     = JSON.parse(item.geojson);
                    var routeColour = item.color || '#1A73E8';
                    var allLineCoords = [];
                    for (var j = 0; j < geojson.features.length; j++) {
                        var f = geojson.features[j];
                        if (f.geometry.type === "LineString") {
                            routeLineFeatures.push({
                                type: "Feature",
                                geometry: f.geometry,
                                properties: { color: routeColour }
                            });
                            allLineCoords = allLineCoords.concat(f.geometry.coordinates);
                        }
                    }
                    boundsCoords = boundsCoords.concat(allLineCoords);

                    if (allLineCoords.length > 0 && item.itemId !== undefined && item.itemId !== null) {
                        routeMarkerGroups.push({
                            startCoord:      allLineCoords[0],
                            endCoord:        allLineCoords[allLineCoords.length - 1],
                            allCoords:       allLineCoords,
                            routeColour:     routeColour,
                            rId:             item.itemId,
                            name:            item.name || '',
                            routeIconBase64: item.routeIconBase64 || null
                        });
                    }

                    // Announcing via waypoints (numbered circles).
                    var viaWaypointsArr = item.viaWaypoints || [];
                    if (viaWaypointsArr.length > 0 && item.itemId !== undefined) {
                        var viaFeatures = [];
                        for (var vi = 0; vi < viaWaypointsArr.length; vi++) {
                            var vw = viaWaypointsArr[vi];
                            viaFeatures.push({
                                type: 'Feature',
                                geometry: { type: 'Point', coordinates: [vw.lng, vw.lat] },
                                properties: { index: vw.index }
                            });
                        }
                        viaGroups.push({
                            sourceId: 'multi-via-source-'  + item.itemId,
                            circleId: 'multi-via-circles-' + item.itemId,
                            labelId:  'multi-via-labels-'  + item.itemId,
                            features: viaFeatures,
                            colour:   routeColour
                        });
                    }

                    // Shaping waypoints (small filled dots, no label).
                    var shapingWaypointsArr = item.shapingWaypoints || [];
                    if (shapingWaypointsArr.length > 0 && item.itemId !== undefined) {
                        var shapingFeatures = [];
                        for (var si = 0; si < shapingWaypointsArr.length; si++) {
                            var sw = shapingWaypointsArr[si];
                            shapingFeatures.push({
                                type: 'Feature',
                                geometry: { type: 'Point', coordinates: [sw.lng, sw.lat] },
                                properties: {}
                            });
                        }
                        shapingGroups.push({
                            sourceId: 'multi-shaping-source-'  + item.itemId,
                            layerId:  'multi-shaping-circles-' + item.itemId,
                            features: shapingFeatures,
                            colour:   routeColour
                        });
                    }

                    if (item.itemId !== undefined && item.itemId !== null) {
                        var arrowCoords = [];
                        for (var afi = 0; afi < geojson.features.length; afi++) {
                            var af = geojson.features[afi];
                            if (af.geometry && af.geometry.type === 'LineString') {
                                arrowCoords = arrowCoords.concat(af.geometry.coordinates);
                            }
                        }
                        arrowGroups.push({
                            sourceId:   'route-arrows-source-multi-' + item.itemId,
                            layerId:    'route-arrows-multi-' + item.itemId,
                            imageId:    'arrow-multi-' + item.itemId,
                            flatCoords: arrowCoords,
                            colour:     routeColour
                        });
                    }
                } else if (item.type === "track" && item.geojson && item.itemId !== undefined) {
                    var trackFeature = JSON.parse(item.geojson);
                    var trackCoords  = trackFeature.geometry ? trackFeature.geometry.coordinates : [];
                    boundsCoords = boundsCoords.concat(trackCoords);
                    trackGroups.push({
                        sourceId:  'multi-track-source-' + item.itemId,
                        layerId:   'multi-track-layer-'  + item.itemId,
                        coords:    trackCoords,
                        colour:    item.color || '#3E515A',
                        lineStyle: item.lineStyle || 'solid',
                        itemId:    item.itemId,
                        name:      item.name || ''
                    });
                }
            }

            // ── Route lines (batched, data-driven colour) ────────────────────────────
            if (routeLineFeatures.length > 0) {
                map.addSource("multi-routes-source", {
                    type: "geojson",
                    data: { type: "FeatureCollection", features: routeLineFeatures }
                });
                map.addLayer({
                    id: "multi-routes-layer",
                    type: "line",
                    source: "multi-routes-source",
                    layout: { "line-cap": "round", "line-join": "round" },
                    paint: { "line-color": ["get", "color"], "line-width": 4 }
                });
            }

            // ── Per-route direction arrows ────────────────────────────────────────────
            var initArrowCount = Math.min(500, Math.max(4, Math.round(Math.pow(2, map.getZoom() - 3))));
            for (var ai = 0; ai < arrowGroups.length; ai++) {
                var ag      = arrowGroups[ai];
                var agPts   = computeArrowPoints(ag.flatCoords, initArrowCount);
                var agFeats = [];
                for (var api = 0; api < agPts.length; api++) {
                    agFeats.push({
                        type: 'Feature',
                        geometry: { type: 'Point', coordinates: agPts[api].coord },
                        properties: { bearing: agPts[api].bearing }
                    });
                }
                if (map.hasImage(ag.imageId)) map.removeImage(ag.imageId);
                map.addImage(ag.imageId, createArrowImage(darkenHex(ag.colour, 0.75)));
                map.addSource(ag.sourceId, { type: 'geojson', data: { type: 'FeatureCollection', features: agFeats } });
                multiViaSources.push(ag.sourceId);
                map.addLayer({
                    id: ag.layerId,
                    type: 'symbol',
                    source: ag.sourceId,
                    layout: {
                        'symbol-placement': 'point',
                        'icon-image': ag.imageId,
                        'icon-rotate': ['get', 'bearing'],
                        'icon-rotation-alignment': 'map',
                        'icon-allow-overlap': true,
                        'icon-ignore-placement': true,
                        'icon-size': 1
                    },
                    paint: {}
                });
                multiViaLayerIds.push(ag.layerId);
            }
            multiArrowData = arrowGroups.map(function(ag) {
                return { sourceId: ag.sourceId, flatCoords: ag.flatCoords };
            });
            if (multiArrowData.length > 0) {
                multiArrowZoomHandler = function() {
                    var count = Math.min(500, Math.max(4, Math.round(Math.pow(2, map.getZoom() - 3))));
                    for (var i = 0; i < multiArrowData.length; i++) {
                        var mad = multiArrowData[i];
                        if (!map.getSource(mad.sourceId)) continue;
                        var pts   = computeArrowPoints(mad.flatCoords, count);
                        var feats = [];
                        for (var pi = 0; pi < pts.length; pi++) {
                            feats.push({
                                type: 'Feature',
                                geometry: { type: 'Point', coordinates: pts[pi].coord },
                                properties: { bearing: pts[pi].bearing }
                            });
                        }
                        map.getSource(mad.sourceId).setData({ type: 'FeatureCollection', features: feats });
                    }
                };
                map.on('zoomend', multiArrowZoomHandler);
            }

            // ── Per-route start/end markers (native Marker, keyed by itemId) ─────────
            for (var ri = 0; ri < routeMarkerGroups.length; ri++) {
                var rm = routeMarkerGroups[ri];

                var startMarker = new maplibregl.Marker({ color: rm.routeColour })
                    .setLngLat(rm.startCoord)
                    .addTo(map);
                multiRouteMarkers.push(startMarker);

                var endMarker = new maplibregl.Marker({ color: rm.routeColour })
                    .setLngLat(rm.endCoord)
                    .addTo(map);
                multiRouteMarkers.push(endMarker);

                var rmLabelCoord = lineMidpoint(rm.allCoords);
                showLabel(rm.rId, rmLabelCoord[0], rmLabelCoord[1], rm.name, rm.routeIconBase64);
            }

            // ── Per-route via markers (native Marker, route-coloured, scale 0.7) ─────
            for (var vi = 0; vi < viaGroups.length; vi++) {
                var vg = viaGroups[vi];
                for (var vfi = 0; vfi < vg.features.length; vfi++) {
                    var viaMarker = new maplibregl.Marker({ color: vg.colour, scale: 0.7 })
                        .setLngLat(vg.features[vfi].geometry.coordinates)
                        .addTo(map);
                    multiRouteMarkers.push(viaMarker);
                }
            }

            // ── Per-route shaping markers (native Marker, grey, scale 0.5) ────────────
            for (var si = 0; si < shapingGroups.length; si++) {
                var sg = shapingGroups[si];
                for (var sfi = 0; sfi < sg.features.length; sfi++) {
                    var shapingMarker = new maplibregl.Marker({ color: '#888888', scale: 0.5, offset: [0, -7] })
                        .setLngLat(sg.features[sfi].geometry.coordinates)
                        .addTo(map);
                    multiRouteMarkers.push(shapingMarker);
                }
            }

            // ── Track lines with start/end markers and labels ────────────────────────
            for (var ti = 0; ti < trackGroups.length; ti++) {
                var tg = trackGroups[ti];
                if (tg.coords.length < 2) { continue; }

                var trackDashArray;
                switch (tg.lineStyle) {
                    case 'dotted':     trackDashArray = [1, 3]; break;
                    case 'short_dash': trackDashArray = [4, 3]; break;
                    case 'long_dash':  trackDashArray = [8, 4]; break;
                    default:           trackDashArray = null;
                }
                var trackPaint = { 'line-color': tg.colour, 'line-width': 3, 'line-opacity': 0.9 };
                if (trackDashArray) { trackPaint['line-dasharray'] = trackDashArray; }

                map.addSource(tg.sourceId, {
                    type: 'geojson',
                    data: { type: 'Feature', geometry: { type: 'LineString', coordinates: tg.coords } }
                });
                multiViaSources.push(tg.sourceId);
                map.addLayer({
                    id: tg.layerId, type: 'line', source: tg.sourceId,
                    layout: { 'line-join': 'round', 'line-cap': 'round' },
                    paint: trackPaint
                });
                multiViaLayerIds.push(tg.layerId);

                var tStartMarker = new maplibregl.Marker({ color: tg.colour })
                    .setLngLat(tg.coords[0])
                    .addTo(map);
                multiRouteMarkers.push(tStartMarker);

                var tEndMarker = new maplibregl.Marker({ color: tg.colour })
                    .setLngLat(tg.coords[tg.coords.length - 1])
                    .addTo(map);
                multiRouteMarkers.push(tEndMarker);

                var tLabelCoord = lineMidpoint(tg.coords);
                showLabel(tg.itemId, tLabelCoord[0], tLabelCoord[1], tg.name, null);
            }

            // ── Per-waypoint markers (native Marker, keyed by itemId) ─────────────
            for (var wi = 0; wi < waypointGroups.length; wi++) {
                var wg = waypointGroups[wi];
                if (wg.wpId === undefined || wg.wpId === null) continue;
                var wpMarker = new maplibregl.Marker({ color: wg.colour })
                    .setLngLat([wg.lng, wg.lat])
                    .addTo(map);
                multiRouteMarkers.push(wpMarker);
                showLabel(wg.wpId, wg.lng, wg.lat, wg.name, wg.labelIconBase64);
            }

            // ── Fit viewport ─────────────────────────────────────────────────────────
            if (boundsCoords.length > 0) {
                var bounds = boundsCoords.reduce(function(b, c) {
                    return [Math.min(b[0], c[0]), Math.min(b[1], c[1]),
                            Math.max(b[2], c[0]), Math.max(b[3], c[1])];
                }, [Infinity, Infinity, -Infinity, -Infinity]);
                map.fitBounds([[bounds[0], bounds[1]], [bounds[2], bounds[3]]], { padding: 60 });
            }
        }

        // ---------------------------------------------------------------------------
        // Map context menu
        // ---------------------------------------------------------------------------

        var contextMenuCoord = { lat: 0, lng: 0 };

        function dismissContextMenu() {
            document.getElementById('map-context-menu').style.display = 'none';
        }

        function addWaypointHere() {
            dismissContextMenu();
            postToSwift({ type: 'addWaypointAtCoordinate',
                          lat: contextMenuCoord.lat, lng: contextMenuCoord.lng });
        }

        map.on('contextmenu', function(e) {
            contextMenuCoord.lat = e.lngLat.lat;
            contextMenuCoord.lng = e.lngLat.lng;
            var menu = document.getElementById('map-context-menu');
            menu.style.left = e.point.x + 'px';
            menu.style.top  = e.point.y + 'px';
            menu.style.display = 'block';
        });

        map.on('click', function() { dismissContextMenu(); });
        map.on('move',  function() { dismissContextMenu(); });

        function findNearestSegment(coords, clickLngLat) {
            var cx = clickLngLat.lng, cy = clickLngLat.lat;
            var bestDist = Infinity, bestIndex = 0;
            var bestNearest = null;
            for (var i = 0; i < coords.length - 1; i++) {
                var ax = coords[i][0],     ay = coords[i][1];
                var bx = coords[i+1][0],   by = coords[i+1][1];
                var dx = bx - ax, dy = by - ay;
                var lenSq = dx * dx + dy * dy;
                var t = lenSq === 0 ? 0 : Math.max(0, Math.min(1,
                    ((cx - ax) * dx + (cy - ay) * dy) / lenSq));
                var nx = ax + t * dx, ny = ay + t * dy;
                var ex = cx - nx, ey = cy - ny;
                var dist = ex * ex + ey * ey;
                if (dist < bestDist) {
                    bestDist = dist;
                    bestIndex = i;
                    bestNearest = { lng: nx, lat: ny };
                }
            }
            return {
                insertIndex: bestIndex + 1,
                anchorA: { lng: coords[bestIndex][0],   lat: coords[bestIndex][1] },
                anchorB: { lng: coords[bestIndex+1][0], lat: coords[bestIndex+1][1] },
                nearestPoint: bestNearest
            };
        }

        map.on('mousedown', function(e) {
            if (!e.originalEvent.altKey) { return; }
            var p = e.point;
            var bbox = [[p.x - 8, p.y - 8], [p.x + 8, p.y + 8]];
            var features = map.queryRenderedFeatures(bbox, { layers: ['route-layer'] });
            if (!features || features.length === 0) { return; }
            e.preventDefault();
            if (!routePointCoords || routePointCoords.length < 2) { return; }
            var seg = findNearestSegment(routePointCoords, e.lngLat);
            routeDragAnchorA    = seg.anchorA;
            routeDragAnchorB    = seg.anchorB;
            routeDragInsertIndex = seg.insertIndex;
            routeDragActive     = true;
        });

        map.on('mousemove', function(e) {
            if (!routeDragActive) { return; }
            var rubberData = {
                type: 'Feature',
                geometry: {
                    type: 'LineString',
                    coordinates: [
                        [routeDragAnchorA.lng, routeDragAnchorA.lat],
                        [e.lngLat.lng, e.lngLat.lat],
                        [routeDragAnchorB.lng, routeDragAnchorB.lat]
                    ]
                }
            };
            if (map.getSource('rubber-band-source')) {
                map.getSource('rubber-band-source').setData(rubberData);
            } else {
                var rubberColour = map.getPaintProperty('route-layer', 'line-color') || '#1A73E8';
                map.addSource('rubber-band-source', { type: 'geojson', data: rubberData });
                map.addLayer({
                    id: 'rubber-band-layer',
                    type: 'line',
                    source: 'rubber-band-source',
                    layout: { 'line-cap': 'round', 'line-join': 'round' },
                    paint: {
                        'line-color': rubberColour,
                        'line-width': 2,
                        'line-dasharray': [2, 2]
                    }
                });
            }
        });

        map.on('mouseup', function(e) {
            if (!routeDragActive) { return; }
            routeDragActive = false;
            if (map.getLayer('rubber-band-layer')) { map.removeLayer('rubber-band-layer'); }
            if (map.getSource('rubber-band-source')) { map.removeSource('rubber-band-source'); }
            postToSwift({
                type: 'insertShapingPoint',
                insertIndex: routeDragInsertIndex,
                lng: e.lngLat.lng,
                lat: e.lngLat.lat
            });
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Alt') { altKeyHeld = true; }
            if (e.key === 'Escape') { dismissContextMenu(); }
        });
        document.addEventListener('keyup', function(e) {
            if (e.key === 'Alt') { altKeyHeld = false; }
        });

        /// Removes all markers, layers and sources added by showMultipleItems(), then clears labels.
        ///
        /// Route start/end, via, and shaping markers are native maplibregl.Marker instances
        /// tracked in multiRouteMarkers and removed here.  Waypoint layers/sources are tracked
        /// in multiViaLayerIds / multiViaSources.
        /// Route lines use fixed IDs (multi-routes-source / multi-routes-layer) and are
        /// removed separately since they are not tracked in the per-item arrays.
        function clearMultipleItems() {
            if (multiArrowZoomHandler) {
                map.off('zoomend', multiArrowZoomHandler);
                multiArrowZoomHandler = null;
            }
            multiArrowData = [];
            // Remove route start/end Marker instances.
            multiRouteMarkers.forEach(function(m) { m.remove(); });
            multiRouteMarkers = [];
            // Remove all per-item dynamic layers and sources.
            for (var i = 0; i < multiViaLayerIds.length; i++) {
                if (map.getLayer(multiViaLayerIds[i])) map.removeLayer(multiViaLayerIds[i]);
            }
            for (var i = 0; i < multiViaSources.length; i++) {
                if (map.getSource(multiViaSources[i])) map.removeSource(multiViaSources[i]);
            }
            multiViaLayerIds = [];
            multiViaSources  = [];
            // Remove fixed-name route line batch.
            if (map.getLayer("multi-routes-layer"))   map.removeLayer("multi-routes-layer");
            if (map.getSource("multi-routes-source")) map.removeSource("multi-routes-source");
            hideAllLabels();
        }

        /// Renders a single GPS track as a styled line.
        ///
        /// trackData — object with: points [{lat, lng}], color (CSS hex), lineStyle
        /// ("dotted" | "short_dash" | "long_dash" | "solid"), itemId, name.
        /// Replaces any previously shown track.
        function showTrack(trackJson) {
            hideTrack();
            var trackData = (typeof trackJson === "string") ? JSON.parse(trackJson) : trackJson;
            if (!trackData || !trackData.points || trackData.points.length < 2) { return; }

            var coords = trackData.points.map(function(p) { return [p.lng, p.lat]; });
            var geojson = {
                type: 'Feature',
                geometry: { type: 'LineString', coordinates: coords }
            };

            map.addSource('track-source', { type: 'geojson', data: geojson });

            var dashArray;
            switch (trackData.lineStyle) {
                case 'dotted':     dashArray = [1, 3]; break;
                case 'short_dash': dashArray = [4, 3]; break;
                case 'long_dash':  dashArray = [8, 4]; break;
                default:           dashArray = null;
            }

            var paint = {
                'line-color': trackData.color || '#3E515A',
                'line-width': 3,
                'line-opacity': 0.9
            };
            if (dashArray) { paint['line-dasharray'] = dashArray; }

            map.addLayer({
                id: 'track-layer',
                type: 'line',
                source: 'track-source',
                layout: { 'line-join': 'round', 'line-cap': 'round' },
                paint: paint
            });

            var trackColor = trackData.color || '#3E515A';
            trackStartMarker = new maplibregl.Marker({ color: trackColor })
                .setLngLat(coords[0])
                .addTo(map);
            trackEndMarker = new maplibregl.Marker({ color: trackColor })
                .setLngLat(coords[coords.length - 1])
                .addTo(map);

            // Fit map to track bounds.
            var bounds = coords.reduce(function(b, c) {
                return b.extend(c);
            }, new maplibregl.LngLatBounds(coords[0], coords[0]));
            map.fitBounds(bounds, { padding: 60, maxZoom: 15 });
        }

        /// Removes the track line and start/end markers added by showTrack().
        function hideTrack() {
            if (trackEndMarker)   { trackEndMarker.remove();   trackEndMarker   = null; }
            if (trackStartMarker) { trackStartMarker.remove(); trackStartMarker = null; }
            if (map.getLayer('track-layer'))   { map.removeLayer('track-layer'); }
            if (map.getSource('track-source')) { map.removeSource('track-source'); }
        }
</script>
</body>
</html>
