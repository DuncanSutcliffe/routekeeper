<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteKeeper Map</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #map {
            width: 100%;
            height: 100%;
        }
        #map-context-menu {
            position: absolute;
            background: white;
            border-radius: 6px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.18);
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            font-size: 13px;
            z-index: 1000;
            display: none;
            min-width: 160px;
            overflow: hidden;
            user-select: none;
        }
        .map-context-item {
            padding: 8px 12px;
            cursor: pointer;
            color: #1a1a1a;
        }
        .map-context-item:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="map-context-menu">
        <div class="map-context-item" onclick="addWaypointHere()">New waypoint here</div>
    </div>

    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
    <script>
        // ---------------------------------------------------------------------------
        // Swift → JavaScript bridge
        // Messages sent from Swift via evaluateJavaScript() are handled here.
        // JavaScript → Swift messages are sent via:
        //   window.webkit.messageHandlers.routekeeper.postMessage({ ... })
        // ---------------------------------------------------------------------------
        function handleSwiftMessage(name, payload) {
            console.log("Swift message:", name, payload);
        }

        function postToSwift(payload) {
            if (window.webkit &&
                window.webkit.messageHandlers &&
                window.webkit.messageHandlers.routekeeper) {
                window.webkit.messageHandlers.routekeeper.postMessage(payload);
            }
        }

        // ---------------------------------------------------------------------------
        // Map initialisation
        // ---------------------------------------------------------------------------
        // mapStyleURL is injected by Swift via WKUserScript before this page loads.
        // If the injection failed, fall back to an empty string so the failure
        // is visible in the console rather than silently using a stale URL.
        const styleURL = (typeof mapStyleURL !== "undefined" && mapStyleURL) ? mapStyleURL : "";

        const map = new maplibregl.Map({
            container: "map",
            style: styleURL,
            center: [-2.0, 54.0],   // [longitude, latitude] — centre over the UK
            zoom: 5
        });

        map.addControl(new maplibregl.NavigationControl(), "top-right");

        map.on("load", function () {
            postToSwift({ type: "mapReady" });
        });

        // ---------------------------------------------------------------------------
        // Route drawing
        // ---------------------------------------------------------------------------

        /// Draws a GeoJSON route on the map.
        ///
        /// geojsonString — a JSON string containing a GeoJSON FeatureCollection
        /// or Feature with a LineString geometry.
        ///
        /// If the map style is not yet loaded the call is deferred until it is.
        /// If a route is already drawn its data is replaced in-place (the layer
        /// is not recreated, which avoids a visual flash).
        function drawRoute(geojsonString) {
            if (!map.isStyleLoaded()) {
                map.once("idle", function () { drawRoute(geojsonString); });
                return;
            }

            const geojson = JSON.parse(geojsonString);

            if (map.getSource("active-route")) {
                // Update existing source data without touching the layer.
                map.getSource("active-route").setData(geojson);
            } else {
                map.addSource("active-route", {
                    type: "geojson",
                    data: geojson
                });

                map.addLayer({
                    id: "active-route",
                    type: "line",
                    source: "active-route",
                    layout: {
                        "line-join": "round",
                        "line-cap": "round"
                    },
                    paint: {
                        "line-color": "#3b82f6",
                        "line-width": 4,
                        "line-opacity": 0.85
                    }
                });
            }

            postToSwift({ type: "routeDrawn" });
        }

        // ---------------------------------------------------------------------------
        // Stored route display (sidebar selection)
        // ---------------------------------------------------------------------------

        /// Returns a Promise that resolves to an HTMLImageElement once the
        /// given base64-encoded PNG has fully loaded.
        ///
        /// MapLibre's addImage() requires a fully loaded image; calling it with
        /// an unloaded HTMLImageElement silently produces a blank icon.
        function loadImage(base64) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => resolve(img);
                img.onerror = reject;
                img.src = 'data:image/png;base64,' + base64;
            });
        }

        /// Shows a stored route on the map, with start and end marker icons and
        /// numbered circles for any intermediate via waypoints.
        ///
        /// geojsonString    — JSON string of the Valhalla GeoJSON FeatureCollection
        /// startBase64      — base64-encoded PNG for the start marker
        /// endBase64        — base64-encoded PNG for the end marker
        /// viaWaypointsJSON — JSON string: array of {lat, lng, index} objects
        ///
        /// Image loading is Promise-based because HTMLImageElement src loading
        /// is async — MapLibre silently ignores addImage calls on unloaded images.
        async function showRoute(geojsonString, startBase64, endBase64, viaWaypointsJSON) {
            clearRoute();
            const geojson = JSON.parse(geojsonString);
            const coords = geojson.features[0].geometry.coordinates;
            const startCoord = coords[0];
            const endCoord = coords[coords.length - 1];

            const [startImg, endImg] = await Promise.all([
                loadImage(startBase64),
                loadImage(endBase64)
            ]);

            if (map.hasImage('route-start')) map.removeImage('route-start');
            if (map.hasImage('route-end'))   map.removeImage('route-end');
            map.addImage('route-start', startImg);
            map.addImage('route-end',   endImg);

            map.addSource('route-source', { type: 'geojson', data: geojson });
            map.addLayer({
                id: 'route-layer',
                type: 'line',
                source: 'route-source',
                layout: { 'line-cap': 'round', 'line-join': 'round' },
                paint: { 'line-color': '#2F7CF6', 'line-width': 4 }
            });

            map.addSource('route-markers-source', {
                type: 'geojson',
                data: {
                    type: 'FeatureCollection',
                    features: [
                        { type: 'Feature', geometry: { type: 'Point', coordinates: startCoord }, properties: { icon: 'route-start' } },
                        { type: 'Feature', geometry: { type: 'Point', coordinates: endCoord },   properties: { icon: 'route-end' } }
                    ]
                }
            });
            map.addLayer({
                id: 'route-markers-layer',
                type: 'symbol',
                source: 'route-markers-source',
                layout: {
                    'icon-image': ['get', 'icon'],
                    'icon-anchor': 'bottom-left',
                    'icon-allow-overlap': true
                }
            });

            // Via waypoint circles — white fill, blue stroke, numbered label.
            const viaWaypoints = (viaWaypointsJSON && viaWaypointsJSON.length > 2)
                ? JSON.parse(viaWaypointsJSON) : [];
            if (viaWaypoints.length > 0) {
                const viaFeatures = viaWaypoints.map(function(w) {
                    return {
                        type: 'Feature',
                        geometry: { type: 'Point', coordinates: [w.lng, w.lat] },
                        properties: { index: w.index }
                    };
                });
                map.addSource('route-via-source', {
                    type: 'geojson',
                    data: { type: 'FeatureCollection', features: viaFeatures }
                });
                map.addLayer({
                    id: 'route-via-circles',
                    type: 'circle',
                    source: 'route-via-source',
                    paint: {
                        'circle-radius': 10,
                        'circle-color': '#FFFFFF',
                        'circle-stroke-color': '#2F7CF6',
                        'circle-stroke-width': 2
                    }
                });
                map.addLayer({
                    id: 'route-via-labels',
                    type: 'symbol',
                    source: 'route-via-source',
                    layout: {
                        'text-field': ['to-string', ['get', 'index']],
                        'text-size': 11,
                        'text-allow-overlap': true,
                        'text-ignore-placement': true
                    },
                    paint: { 'text-color': '#1a1a1a' }
                });
            }

            const bounds = geojson.features[0].bbox ||
                coords.reduce((b, c) => [
                    Math.min(b[0], c[0]), Math.min(b[1], c[1]),
                    Math.max(b[2], c[0]), Math.max(b[3], c[1])
                ], [Infinity, Infinity, -Infinity, -Infinity]);
            map.fitBounds([[bounds[0], bounds[1]], [bounds[2], bounds[3]]], { padding: 60 });
        }

        /// Removes the route line, marker symbols, via circles, registered images,
        /// and all associated sources from the map.
        ///
        /// Also clears the legacy "active-route" id used by drawRoute() so that
        /// switching between the two mechanisms never leaves orphaned layers.
        function clearRoute() {
            if (map.getLayer('route-via-labels'))   map.removeLayer('route-via-labels');
            if (map.getLayer('route-via-circles'))  map.removeLayer('route-via-circles');
            if (map.getSource('route-via-source'))  map.removeSource('route-via-source');
            if (map.getLayer('route-markers-layer')) map.removeLayer('route-markers-layer');
            if (map.getSource('route-markers-source')) map.removeSource('route-markers-source');
            if (map.getLayer('route-layer'))   map.removeLayer('route-layer');
            if (map.getSource('route-source')) map.removeSource('route-source');
            if (map.hasImage('route-start'))   map.removeImage('route-start');
            if (map.hasImage('route-end'))     map.removeImage('route-end');
            if (map.getLayer('active-route'))  map.removeLayer('active-route');
            if (map.getSource('active-route')) map.removeSource('active-route');
        }

        // ---------------------------------------------------------------------------
        // Waypoint display
        // ---------------------------------------------------------------------------

        /// Shows a single waypoint marker on the map.
        ///
        /// lat, lng — WGS-84 coordinates
        /// colour   — CSS colour string, e.g. "#E8453C"
        ///
        /// Any existing waypoint marker is removed first. If the style is not yet
        /// loaded the call is deferred until the map is idle.
        function showWaypoint(lat, lng, colour) {
            if (!map.isStyleLoaded()) {
                map.once("idle", function () { showWaypoint(lat, lng, colour); });
                return;
            }

            clearWaypoint();

            map.addSource("waypoint-source", {
                type: "geojson",
                data: {
                    type: "Feature",
                    geometry: {
                        type: "Point",
                        coordinates: [lng, lat]
                    }
                }
            });

            map.addLayer({
                id: "waypoint-layer",
                type: "circle",
                source: "waypoint-source",
                paint: {
                    "circle-radius": 10,
                    "circle-color": colour,
                    "circle-stroke-width": 2,
                    "circle-stroke-color": "#FFFFFF"
                }
            });

            map.flyTo({ center: [lng, lat], zoom: 13 });
        }

        /// Removes the waypoint marker layer and source from the map.
        function clearWaypoint() {
            if (map.getLayer("waypoint-layer")) {
                map.removeLayer("waypoint-layer");
            }
            if (map.getSource("waypoint-source")) {
                map.removeSource("waypoint-source");
            }
        }

        // ---------------------------------------------------------------------------
        // Multi-item display (list selection and multi-select)
        // ---------------------------------------------------------------------------

        /// Renders multiple waypoints and routes simultaneously, then fits the
        /// viewport to contain all of them.
        ///
        /// itemsJson — a JSON string containing an array of item objects, each with:
        ///   { type: "waypoint", lat, lng, color }
        ///   { type: "route", geojson, startIcon, endIcon }
        ///
        /// Clears any previously displayed single-item content and multi-item
        /// content before rendering. Always calls fitBounds regardless of the
        /// current viewport position.
        async function showMultipleItems(itemsJson) {
            if (!map.isStyleLoaded()) {
                map.once("idle", function () { showMultipleItems(itemsJson); });
                return;
            }

            clearMultipleItems();
            clearRoute();
            clearWaypoint();

            const items = JSON.parse(itemsJson);
            const waypointFeatures = [];
            const routeLineFeatures = [];
            const routeMarkerFeatures = [];

            // Load route start/end icons once — all routes share the same icons.
            const firstRoute = items.find(function(i) { return i.type === "route"; });
            if (firstRoute) {
                const startImg = await loadImage(firstRoute.startIcon);
                const endImg   = await loadImage(firstRoute.endIcon);
                if (!map.hasImage("multi-route-start")) map.addImage("multi-route-start", startImg);
                if (!map.hasImage("multi-route-end"))   map.addImage("multi-route-end",   endImg);
            }

            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                if (item.type === "waypoint") {
                    waypointFeatures.push({
                        type: "Feature",
                        geometry: { type: "Point", coordinates: [item.lng, item.lat] },
                        properties: { color: item.color }
                    });
                } else if (item.type === "route") {
                    var geojson = JSON.parse(item.geojson);
                    var allLineCoords = [];
                    for (var j = 0; j < geojson.features.length; j++) {
                        var f = geojson.features[j];
                        if (f.geometry.type === "LineString") {
                            routeLineFeatures.push(f);
                            allLineCoords = allLineCoords.concat(f.geometry.coordinates);
                        }
                    }
                    if (allLineCoords.length > 0) {
                        routeMarkerFeatures.push(
                            {
                                type: "Feature",
                                geometry: { type: "Point", coordinates: allLineCoords[0] },
                                properties: { icon: "multi-route-start" }
                            },
                            {
                                type: "Feature",
                                geometry: { type: "Point", coordinates: allLineCoords[allLineCoords.length - 1] },
                                properties: { icon: "multi-route-end" }
                            }
                        );
                    }
                }
            }

            if (routeLineFeatures.length > 0) {
                map.addSource("multi-routes-source", {
                    type: "geojson",
                    data: { type: "FeatureCollection", features: routeLineFeatures }
                });
                map.addLayer({
                    id: "multi-routes-layer",
                    type: "line",
                    source: "multi-routes-source",
                    layout: { "line-cap": "round", "line-join": "round" },
                    paint: { "line-color": "#2F7CF6", "line-width": 4 }
                });
            }

            if (routeMarkerFeatures.length > 0) {
                map.addSource("multi-markers-source", {
                    type: "geojson",
                    data: { type: "FeatureCollection", features: routeMarkerFeatures }
                });
                map.addLayer({
                    id: "multi-markers-layer",
                    type: "symbol",
                    source: "multi-markers-source",
                    layout: {
                        "icon-image": ["get", "icon"],
                        "icon-anchor": "bottom-left",
                        "icon-allow-overlap": true
                    }
                });
            }

            if (waypointFeatures.length > 0) {
                map.addSource("multi-waypoints-source", {
                    type: "geojson",
                    data: { type: "FeatureCollection", features: waypointFeatures }
                });
                map.addLayer({
                    id: "multi-waypoints-layer",
                    type: "circle",
                    source: "multi-waypoints-source",
                    paint: {
                        "circle-radius": 10,
                        "circle-color": ["get", "color"],
                        "circle-stroke-width": 2,
                        "circle-stroke-color": "#FFFFFF"
                    }
                });
            }

            // Fit viewport to the combined extent of all rendered content.
            var allCoords = [];
            for (var k = 0; k < waypointFeatures.length; k++) {
                allCoords.push(waypointFeatures[k].geometry.coordinates);
            }
            for (var l = 0; l < routeLineFeatures.length; l++) {
                allCoords = allCoords.concat(routeLineFeatures[l].geometry.coordinates);
            }
            if (allCoords.length > 0) {
                var bounds = allCoords.reduce(function(b, c) {
                    return [
                        Math.min(b[0], c[0]),
                        Math.min(b[1], c[1]),
                        Math.max(b[2], c[0]),
                        Math.max(b[3], c[1])
                    ];
                }, [Infinity, Infinity, -Infinity, -Infinity]);
                map.fitBounds([[bounds[0], bounds[1]], [bounds[2], bounds[3]]], { padding: 60 });
            }
        }

        // ---------------------------------------------------------------------------
        // Map context menu
        // ---------------------------------------------------------------------------

        var contextMenuCoord = { lat: 0, lng: 0 };

        function dismissContextMenu() {
            document.getElementById('map-context-menu').style.display = 'none';
        }

        function addWaypointHere() {
            dismissContextMenu();
            postToSwift({ type: 'addWaypointAtCoordinate',
                          lat: contextMenuCoord.lat, lng: contextMenuCoord.lng });
        }

        map.on('contextmenu', function(e) {
            contextMenuCoord.lat = e.lngLat.lat;
            contextMenuCoord.lng = e.lngLat.lng;
            var menu = document.getElementById('map-context-menu');
            menu.style.left = e.point.x + 'px';
            menu.style.top  = e.point.y + 'px';
            menu.style.display = 'block';
        });

        map.on('click', function() { dismissContextMenu(); });
        map.on('move',  function() { dismissContextMenu(); });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') { dismissContextMenu(); }
        });

        /// Removes all layers, sources, and images added by showMultipleItems().
        function clearMultipleItems() {
            if (map.getLayer("multi-waypoints-layer"))  map.removeLayer("multi-waypoints-layer");
            if (map.getSource("multi-waypoints-source")) map.removeSource("multi-waypoints-source");
            if (map.getLayer("multi-routes-layer"))     map.removeLayer("multi-routes-layer");
            if (map.getSource("multi-routes-source"))   map.removeSource("multi-routes-source");
            if (map.getLayer("multi-markers-layer"))    map.removeLayer("multi-markers-layer");
            if (map.getSource("multi-markers-source"))  map.removeSource("multi-markers-source");
            if (map.hasImage("multi-route-start"))      map.removeImage("multi-route-start");
            if (map.hasImage("multi-route-end"))        map.removeImage("multi-route-end");
        }
</script>
</body>
</html>
